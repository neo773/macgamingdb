services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - SERVER_PORT=4000
      - LIBSQL_DATABASE_URL=${LIBSQL_DATABASE_URL}
      - LIBSQL_DATABASE_TOKEN=${LIBSQL_DATABASE_TOKEN}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
      - GG_DEALS_API_KEY=${GG_DEALS_API_KEY}
      - STEAM_WEB_API_KEY=${STEAM_WEB_API_KEY}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - WEB_APP_URL=http://web:3000
      - REVALIDATE_SECRET=${REVALIDATE_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID}
      - APPLE_KEY_ID=${APPLE_KEY_ID}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY}
      - APPLE_APP_BUNDLE_IDENTIFIER=${APPLE_APP_BUNDLE_IDENTIFIER}
      - STEAM_OPENID_REALM=${STEAM_OPENID_REALM}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4000/rest/mac-configs > /dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      api:
        condition: service_healthy
    environment:
      - INTERNAL_API_URL=http://api:4000
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
      - NEXT_PUBLIC_DOMAIN=${NEXT_PUBLIC_DOMAIN}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - LIBSQL_DATABASE_URL=${LIBSQL_DATABASE_URL}
      - LIBSQL_DATABASE_TOKEN=${LIBSQL_DATABASE_TOKEN}
      - REVALIDATE_SECRET=${REVALIDATE_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - STEAM_WEB_API_KEY=${STEAM_WEB_API_KEY}
      - NEXT_PUBLIC_APPLE_CLIENT_ID=${NEXT_PUBLIC_APPLE_CLIENT_ID}
      - NEXT_PUBLIC_APPLE_REDIRECT_URI=${NEXT_PUBLIC_APPLE_REDIRECT_URI}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID}
      - APPLE_KEY_ID=${APPLE_KEY_ID}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY}
      - APPLE_APP_BUNDLE_IDENTIFIER=${APPLE_APP_BUNDLE_IDENTIFIER}
      - STEAM_OPENID_REALM=${STEAM_OPENID_REALM}
    ports:
      - '3000'
